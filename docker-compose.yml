services:
  mysql:
    image: mysql:8
    container_name: yingshi-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: yingshi
      MYSQL_USER: yzh666
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-yingshi123}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/src/main/resources/sql/schema.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yingshi-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/yingshi?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true
      SPRING_DATASOURCE_USERNAME: yzh666
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-yingshi123}
      JWT_SECRET: ${JWT_SECRET:-yzh-super-secure-secret-key-2026-very-long}
      LLM_API_KEY: ${LLM_API_KEY}
      EZVIZ_APP_KEY: ${EZVIZ_APP_KEY:-e70fb747967f44deb4cabc17df64be5c}
      EZVIZ_APP_SECRET: ${EZVIZ_APP_SECRET:-a7eb9aff632240cbf1e5610f15dc0ccc}
      EZVIZ_REDIRECT_URI: ${EZVIZ_REDIRECT_URI:-http://localhost/api/ezviz/oauth/callback}
      EZVIZ_FRONTEND_URL: ${EZVIZ_FRONTEND_URL:-http://localhost}
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: yingshi-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql-data:
