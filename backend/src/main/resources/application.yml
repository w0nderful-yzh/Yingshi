spring:
  application:
    name: yingshi

  ai:
    openai:
      api-key: ${LLM_API_KEY}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
          temperature: 0.7

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/yingshi?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true}
    username: ${SPRING_DATASOURCE_USERNAME:yzh666}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

server:
  port: 8080

app:
  auth:
    # 开发阶段允许未绑定萤石账号时直接访问现有设备，便于本地摄像头调试
    allow-unbound-device-access: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

jwt:
  secret: ${JWT_SECRET:yzh-super-secure-secret-key-2026-very-long}
  expireSeconds: 7200

ezviz:
  app-key: ${EZVIZ_APP_KEY:e70fb747967f44deb4cabc17df64be5c}
  app-secret: ${EZVIZ_APP_SECRET:a7eb9aff632240cbf1e5610f15dc0ccc}
  base-url: https://open.ys7.com
  oauth:
    redirect-uri: ${EZVIZ_REDIRECT_URI:http://localhost:8080/api/ezviz/oauth/callback}
    frontend-url: ${EZVIZ_FRONTEND_URL:http://localhost:5173}

# 宠物检测配置
pet:
  detection:
    # 检测间隔(毫秒), 默认30秒
    interval-ms: 30000
    # 帧差像素阈值 (0-255), 越小越敏感, 建议20-35
    pixel-threshold: 25
    # 运动检测网格大小(像素)
    grid-size: 20
    # 最小运动区域面积(平方像素), 低于此值视为噪声忽略
    min-area-pixels: 400
    # 默认告警冷却时间(秒)
    default-cooldown-seconds: 300
