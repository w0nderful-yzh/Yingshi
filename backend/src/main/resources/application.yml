# 宠物检测配置
pet:
  detection:
    # 检测间隔(毫秒), 默认30秒
    interval-ms: 30000
    # 帧差像素阈值 (0-255), 越小越敏感, 建议20-35
    pixel-threshold: 25
    # 运动检测网格大小(像素)
    grid-size: 20
    # 最小运动区域面积(平方像素), 低于此值视为噪声忽略
    min-area-pixels: 400
    # 默认告警冷却时间(秒)
    default-cooldown-seconds: 300